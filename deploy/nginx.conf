# Kasku — Nginx reverse proxy configuration
# Phase 1: HTTP only, accessed via IP address
#
# Install:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/kasku
#   sudo ln -sf /etc/nginx/sites-available/kasku /etc/nginx/sites-enabled/kasku
#   sudo rm -f /etc/nginx/sites-enabled/default   # optional: remove default site
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name 202.10.42.99;

    # Max upload size (adjust if you add file uploads later)
    client_max_body_size 10M;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # Pass real client info to the Go app
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket / HTMX streaming support
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;
    }
}
